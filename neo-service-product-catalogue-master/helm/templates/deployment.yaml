apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "product-catalogue-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "product-catalogue-service.name" . }}
    helm.sh/chart: {{ include "product-catalogue-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "product-catalogue-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "product-catalogue-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      # Role of writing the CloudWatch logs
      annotations:
        iam.amazonaws.com/role: {{ .Values.aws.role }}
        timestamp: {{ now | quote }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            - mountPath: /sharedFiles
              name: shared-files
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            failureThreshold: 15
            initialDelaySeconds: 10
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            failureThreshold: 60
            periodSeconds: 10
          env:
            - name: log_group
              value: {{ .Values.env.log_group | quote }}
            - name: APPDYNAMICS_CONTROLLER_HOST_NAME
              value: {{ .Values.appdynamics.appdynamics_controller_host_name }}
            - name: APPDYNAMICS_CONTROLLER_PORT
              value: {{ .Values.appdynamics.appdynamics_controller_port | quote }}
            - name: APPDYNAMICS_CONTROLLER_SSL_ENABLED
              value: {{ .Values.appdynamics.appdynamics_controller_ssl_enabled | quote }}
            - name: APPDYNAMICS_AGENT_APPLICATION_NAME
              value: {{ .Values.appdynamics.appdynamics_agent_application_name }}
            - name: APPDYNAMICS_AGENT_TIER_NAME
              value: {{ .Chart.Name }}
            - name: APPDYNAMICS_JAVA_AGENT_REUSE_NODE_NAME
              value: {{ .Values.appdynamics.appdynamics_java_agent_reuse_node_name | quote }}
            - name: APPDYNAMICS_JAVA_AGENT_REUSE_NODE_NAME_PREFIX
              value: {{ .Chart.Name }}
            - name: APPDYNAMICS_AGENT_ACCOUNT_NAME
              value: {{ .Values.appdynamics.appdynamics_agent_account_name }}
            - name: APPDYNAMICS_AGENT_ACCOUNT_ACCESS_KEY
              value: {{ .Values.appdynamics.appdynamics_agent_account_access_key }}
            - name: spring.profiles.active
              value: {{ .Values.env.spring.profiles.active }}
            - name: contentful.accessToken
              value: {{ .Values.env.contentful.accessToken }}
            - name: contentful.spaceId
              value: {{ .Values.env.contentful.spaceId }}
            - name: contentful.environmentId
              value: {{ .Values.env.contentful.environmentId }}
            - name: contentful.ilabankspace.accessToken
              value: {{ .Values.env.contentful.ilabankspace.accessToken }}
            - name: contentful.ilabankspace.spaceId
              value: {{ .Values.env.contentful.ilabankspace.spaceId }}
            - name: contentful.ilabankspace.environmentId
              value: {{ .Values.env.contentful.ilabankspace.environmentId }}
            - name: pg_write_db_host
              value: {{ .Values.env.pg_write_db_host }}
            - name: pg_read_db_host
              value: {{ .Values.env.pg_read_db_host }}
            - name: pg_db_password
              value: {{ .Values.env.pg_db_password }}
            - name: pg_db_username
              value: {{ .Values.env.pg_db_username }}
            - name: pg_db_name
              value: {{ .Values.env.pg_db_name }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
    affinity:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
    tolerations:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      initContainers:
      - name: appd-agent
        image: 096987977627.dkr.ecr.eu-west-1.amazonaws.com/misc/appd-appserver-agent:latest
        imagePullPolicy: Always
        command: ['cp', '-r', '/sharedFiles/AppServerAgent', '/mountPath/AppServerAgent']
        resources:
          limits:
            cpu: 200m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 1Gi
        volumeMounts:
          - mountPath: /mountPath
            name: shared-files
      volumes:
        - name: shared-files
          emptyDir: {}
