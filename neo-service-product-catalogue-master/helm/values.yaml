replicaCount: 1

image:
  repository: 096987977627.dkr.ecr.eu-west-1.amazonaws.com/api/product-catalogue-service
  tag: latest
  pullPolicy: Always

resources:
  limits:
    cpu: 200m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 1Gi

nameOverride: "product-catalogue-service"
fullnameOverride: "product-catalogue-service"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  paths:
    - /api/v1/product-catalogue

aws:
  role: service-default-role

appdynamics:
  appdynamics_controller_host_name: null
  appdynamics_agent_account_name: null
  appdynamics_agent_account_access_key: null
  appdynamics_agent_application_name: api-dev
  appdynamics_java_agent_reuse_node_name: True
  appdynamics_controller_port: 443
  appdynamics_controller_ssl_enabled: True

env:
  spring:
    profiles:
      active: dev
  contentful:
    accessToken: null
    spaceId: null
    environmentId: development
    ilabankspace:
      accessToken: null
      spaceId: dh72gzoq5i91
      environmentId: SIT
  pg_write_db_host: null
  pg_read_db_host: null
  pg_db_name: neo_service_product_catalogue
  pg_db_password: null
  pg_db_username: null
